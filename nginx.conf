# =============================================================================
# iWantU Platform — Nginx Configuration
#
# Purpose: Reverse proxy for the Next.js app with SSL termination,
# gzip compression, static asset caching, security headers, and rate limiting.
#
# Usage: Mount this file into the nginx container or copy to /etc/nginx/nginx.conf
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    # ---------------------------------------------------------------------------
    # Gzip Compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Rate Limiting Zones
    # ---------------------------------------------------------------------------
    # General API: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    # Auth endpoints: 10 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Upload endpoints: 20 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;

    # ---------------------------------------------------------------------------
    # Upstream
    # ---------------------------------------------------------------------------
    upstream nextjs {
        server app:3000;
        keepalive 64;
    }

    # ---------------------------------------------------------------------------
    # HTTP → HTTPS Redirect
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no redirect)
        location /health {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS Server
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        # ------------------------------------------------------------------
        # SSL Configuration (paths should be mounted via Docker volumes)
        # ------------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ------------------------------------------------------------------
        # Security Headers
        # ------------------------------------------------------------------
        add_header X-Content-Type-Options    "nosniff"                   always;
        add_header X-Frame-Options           "DENY"                      always;
        add_header X-XSS-Protection          "1; mode=block"             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ------------------------------------------------------------------
        # Static assets — aggressive caching
        # ------------------------------------------------------------------
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;

            # Next.js static assets have content hashes — cache for a year
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options    "nosniff"                   always;
            add_header X-Frame-Options           "DENY"                      always;
            add_header X-XSS-Protection          "1; mode=block"             always;
        }

        # Uploads directory (served directly if using local storage)
        location /uploads/ {
            alias /data/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            add_header X-Content-Type-Options    "nosniff"                   always;
        }

        # ------------------------------------------------------------------
        # Rate-limited API endpoints
        # ------------------------------------------------------------------

        # Auth routes — strict rate limit
        location ~ ^/api/(auth|.*login|.*register) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # Upload routes — moderate rate limit
        location ~ ^/api/upload {
            limit_req zone=upload burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # MCP routes — moderate rate limit
        location ~ ^/api/mcp {
            limit_req zone=general burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # General API routes — standard rate limit
        location /api/ {
            limit_req zone=general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }

        # ------------------------------------------------------------------
        # Default — proxy everything else to Next.js
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
        }
    }
}
