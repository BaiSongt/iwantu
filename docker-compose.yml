version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: iwantu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iwantu
      POSTGRES_PASSWORD: iwantu123
      POSTGRES_DB: iwantu
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwantu -d iwantu"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - iwantu-network

  app:
    image: iwantu-app:latest
    container_name: iwantu-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://iwantu:iwantu123@postgres:5432/iwantu
      JWT_SECRET: iwantu-platform-jwt-secret-change-in-production-2024
      NODE_ENV: production
      UPLOAD_DIR: /data/uploads
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@iwantu.com}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/data/uploads
    networks:
      - iwantu-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  iwantu-network:
    driver: bridge
